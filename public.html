<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pozo Acumulado | Sorteo Activo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at 30% 10%, #1f3b1a, #0a1f0a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 16px;
        }
        .premio-card {
            background: linear-gradient(135deg, #fff5e6 0%, #ffefcf 100%);
            border-radius: 68px 32px 68px 32px;
            max-width: 650px;
            width: 100%;
            padding: 2rem 1.6rem;
            box-shadow: 0 30px 40px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,245,190,0.8);
            text-align: center;
            transition: 0.2s;
        }
        .etiqueta {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: #e0c48b;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            color: #2b3820;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .monto-principal {
            font-size: 4.2rem;
            font-weight: 800;
            background: #1e2a1b;
            display: inline-block;
            padding: 0.3rem 1.6rem;
            border-radius: 80px;
            color: #ffeaac;
            box-shadow: inset 0 -2px 0 #5e794b, 0 8px 18px rgba(0,0,0,0.2);
            margin: 0.8rem 0;
            letter-spacing: 2px;
        }
        .detalle-suma {
            background: #2d4227;
            border-radius: 60px;
            padding: 0.9rem;
            margin: 1.5rem 0;
            color: #f9e2a1;
        }
        .badge-suma {
            font-size: 2rem;
            font-weight: bold;
            background: #f6b83d;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 50px;
            color: #2c2b1a;
            margin: 8px 0;
        }
        .participantes-suave {
            font-size: 1rem;
            margin-top: 1rem;
            background: #e9dbbc80;
            border-radius: 50px;
            padding: 0.4rem;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(3px);
        }
        .refresco-automatico {
            font-size: 0.7rem;
            color: #7b6b42;
            margin-top: 1.8rem;
            border-top: 1px solid #dac27c;
            padding-top: 1rem;
        }
        .btn-link {
            display: inline-block;
            margin-top: 1rem;
            background: #7d6942;
            color: white;
            text-decoration: none;
            padding: 0.4rem 1rem;
            border-radius: 100px;
            font-size: 0.8rem;
        }
        .pozo-valor {
            font-weight: bold;
            transition: all 0.2s ease;
        }
        @keyframes ligeroBrillo {
            0% { text-shadow: 0 0 0px gold;}
            100% { text-shadow: 0 0 8px #ffbf40;}
        }
        .actualizado {
            animation: ligeroBrillo 0.4s ease-out;
        }
    </style>
</head>
<body>
<div class="premio-card" id="mainCard">
    <div class="etiqueta">🎲 PREMIO ACUMULADO 🎲</div>
    <div class="monto-principal" id="pozoDisplay">$12.500</div>
    
    <div class="detalle-suma">
        🔥 PRÓXIMA APUESTA SUMA 🔥<br>
        <div class="badge-suma" id="nextSumDisplay">$8.000</div>
        <small>(80% de cada nueva apuesta de $10.000)</small>
    </div>
    
    <div class="participantes-suave" id="participantesSuave">
        👥 Participantes actuales: <span id="participantesCountDisplay">1</span>
    </div>
    
    <div class="refresco-automatico">
        ⚡ Datos en vivo · Se actualizan solos cuando el administrador los cambia ⚡
        <br>
        <a href="admin.html" class="btn-link" target="_blank">🔧 Panel de administración</a>
    </div>
</div>

<script>
    // Mismas constantes y fórmula que en admin
    const INITIAL_POT = 12500;
    const INCREMENT = 8000;
    
    function calcularPozo(participantes) {
        if (participantes < 1) participantes = 1;
        return INITIAL_POT + (participantes - 1) * INCREMENT;
    }
    
    const formatter = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0, maximumFractionDigits: 0 });
    
    // Elementos del DOM
    const pozoDisplaySpan = document.getElementById('pozoDisplay');
    const nextSumSpan = document.getElementById('nextSumDisplay');
    const participantesCountSpan = document.getElementById('participantesCountDisplay');
    const cardDiv = document.getElementById('mainCard');
    
    function actualizarVistaPublica() {
        let stored = localStorage.getItem('participantsCount');
        let participantes = (stored !== null && !isNaN(parseInt(stored))) ? parseInt(stored) : 1;
        if (participantes < 1) participantes = 1;
        
        const pozoActual = calcularPozo(participantes);
        pozoDisplaySpan.innerText = formatter.format(pozoActual);
        nextSumSpan.innerText = formatter.format(INCREMENT);
        participantesCountSpan.innerText = participantes;
        
        // Pequeña animación de actualización
        pozoDisplaySpan.classList.add('actualizado');
        setTimeout(() => {
            pozoDisplaySpan.classList.remove('actualizado');
        }, 400);
    }
    
    // Escuchar cambios en localStorage (desde admin u otra pestaña)
    window.addEventListener('storage', (event) => {
        if (event.key === 'participantsCount') {
            actualizarVistaPublica();
        }
    });
    
    // Cada vez que la página se enfoca, también podemos verificar (por si acaso)
    window.addEventListener('focus', () => {
        actualizarVistaPublica();
    });
    
    // Cargar al inicio
    actualizarVistaPublica();
    
    // Opcional: si quieres un chequeo cada 2 segundos (solo por robustez, pero storage es suficiente)
    // De todas formas, storage cubre 99% de casos.
</script>
</body>
</html>
